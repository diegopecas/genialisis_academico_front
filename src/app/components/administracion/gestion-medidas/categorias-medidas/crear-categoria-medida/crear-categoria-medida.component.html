<div class="modulo">
    <app-header [tituloModulo]="titulo" [mostrarCrear]="false" [accion]="accion"
        [raiz]="'/administracion/gestion-medidas/categorias'" [regresar]="regresar"
        [iconoTitulo]="'/assets/images/medidas.png'"></app-header>

    <div class="container mt-5" [ngClass]="{ 'disabled-container': !editable }">
        <div class="row">
            <div class="col-sm-12 col-md-6">
                <label class="form-label">Nombre <span class="text-danger">*</span></label>
                <input type="text" class="form-control form-control-lg" [(ngModel)]="model.nombre"
                    [ngClass]="{'is-invalid': !model.nombre && submitted}" placeholder="Nombre de la categoría">
            </div>
            <div class="col-sm-12 col-md-6">
                <label class="form-label">Descripción</label>
                <input type="text" class="form-control form-control-lg" [(ngModel)]="model.descripcion"
                    placeholder="Descripción breve">
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-sm-12 col-md-4">
                <label class="form-label">Icono (clase FontAwesome)</label>
                <div class="input-group">
                    <span class="input-group-text"><i [class]="model.icono"></i></span>
                    <input type="text" class="form-control" [(ngModel)]="model.icono" placeholder="fas fa-ruler">
                </div>
            </div>
            <div class="col-sm-12 col-md-4">
                <label class="form-label">Orden</label>
                <input type="number" class="form-control form-control-lg" [(ngModel)]="model.orden" min="0">
            </div>
            <div class="col-sm-12 col-md-4">
                <label class="form-label">Estado</label>
                <select class="form-select form-select-lg" [(ngModel)]="model.activo">
                    <option [ngValue]="1">Activo</option>
                    <option [ngValue]="0">Inactivo</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-sm-6" *ngIf="editable">
                <button class="btn btn-lg btn-warning w-100" (click)="guardar()">
                    <i class="fas fa-save me-2"></i>Grabar
                </button>
            </div>
            <div class="col-sm-6">
                <button class="btn btn-lg btn-secondary w-100" (click)="volver()">
                    <i class="fas fa-arrow-left me-2"></i>Volver
                </button>
            </div>
        </div>
    </div>
</div>
