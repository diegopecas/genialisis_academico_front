<div class="modulo">
    <app-header 
        [tituloModulo]="titulo" 
        [mostrarCrear]="false" 
        [raiz]="'/administracion/datos-maestros'" 
        [regresar]="'/administracion/datos-maestros'"
        [iconoTitulo]="'/assets/images/medidas.png'">
    </app-header>

    <div class="container-fluid mt-5">
        <div class="text-center mb-5">
            <h2 class="titulo-seccion">Gestión de Medidas Corporales</h2>
            <p class="subtitulo-seccion">Administra categorías, unidades y medidas antropométricas</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6 mb-4" *ngFor="let opcion of opciones">
                <div class="card-menu" (click)="irA(opcion.ruta)">
                    <div class="card-menu-content">
                        <div class="icono-container" [ngClass]="opcion.id">
                            <img [src]="opcion.imagen" [alt]="opcion.nombre" />
                        </div>
                        <h3 class="card-titulo">{{ opcion.nombre }}</h3>
                        <p class="card-descripcion">{{ opcion.descripcion }}</p>
                        <div class="card-footer-custom">
                            <span class="link-accion">Gestionar <i class="fas fa-arrow-right"></i></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
