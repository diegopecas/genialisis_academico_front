<div class="modulo">
  <app-header
    [tituloModulo]="titulo"
    [mostrarCrear]="false"
    [accion]="'ConsultarTodos'"
    [raiz]="'/administracion/configuracion-ia'"
    [regresar]="'/administracion/datos-maestros'"
    [iconoTitulo]="'/assets/images/configuracion-ia.png'"
  ></app-header>
  
  <app-tablas
    [titulos]="titulos"
    [datos]="datos"
    [raiz]="'/administracion/configuracion-ia'"
    [acciones]="acciones"
    [accionEditar]="true"
    [accionEliminar]="false"
    [mostrarBuscar]="true"
    [columnasFiltro]="columnasFiltro"
    (clicAccion)="clicAccion($event)"
  ></app-tablas>
</div>
