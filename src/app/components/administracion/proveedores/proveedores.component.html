<div class="modulo">
  <app-header
    [tituloModulo]="titulo"
    [mostrarCrear]="true"
    [accion]="'ConsultarTodos'"
    [raiz]="'/administracion/proveedores'"
    [regresar]="'/administracion/datos-maestros'"
    [iconoTitulo]="'/assets/images/proveedores.png'"
  ></app-header>
  
  <!-- Vista de tabla - El componente de tablas maneja responsive automáticamente -->
  <app-tablas
    [titulos]="titulos"
    [datos]="datos"
    [raiz]="'/administracion/proveedores'"
    [acciones]="acciones"
    [accionEditar]="true"
    [accionEliminar]="true"
    [mostrarBuscar]="true"
    [columnasFiltro]="columnasFiltro"
    (clicAccion)="clicAccion($event)"
  ></app-tablas>
</div>
