<div class="modulo">
  <app-header 
    [tituloModulo]="titulo" 
    [mostrarCrear]="true" 
    [accion]="'ConsultarTodos'" 
    [raiz]="'/docentes'" 
    [regresar]="'/gestion-docentes'" 
    [iconoTitulo]="'/assets/images/docentes.png'">
  </app-header>
  
  <app-tablas 
    [titulos]="titulos" 
    [datos]="datosFiltrados" 
    [raiz]="'/docentes'" 
    [accionVer]="true" 
    [accionEditar]="true" 
    [accionEliminar]="true"
    [acciones]="acciones"
    (clicAccion)="accionTabla($event)">
  </app-tablas>
</div>
