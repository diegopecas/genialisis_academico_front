<div class="modulo">
    <app-header 
        [tituloModulo]="titulo" 
        [mostrarCrear]="true" 
        [accion]="'ConsultarTodos'"
        [raiz]="'/operaciones/salidas-alimentacion'" 
        [regresar]="'/operaciones'"
        [iconoTitulo]="'/assets/images/salidas_alimentacion.png'">
    </app-header>

    <!-- Vista de tabla -->
    <app-tablas 
        [titulos]="titulos" 
        [datos]="datos" 
        [raiz]="'/operaciones/salidas-alimentacion'" 
        [acciones]="acciones" 
        [accionVer]="true" 
        [accionEditar]="true" 
        [accionEliminar]="false" 
        [mostrarBuscar]="true" 
        [columnasFiltro]="columnasFiltro"
        (clicAccion)="clicAccion($event)">
    </app-tablas>
</div>
