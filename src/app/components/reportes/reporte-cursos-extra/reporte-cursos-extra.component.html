<div class="modulo">
    <app-header [tituloModulo]="titulo" [mostrarCrear]="false" [raiz]="'/reportes'" [regresar]="'/reportes'"
        [iconoTitulo]="'/assets/images/cursos-extra.png'"></app-header>

    <div class="container-fluid mt-4 px-4">
        <div class="row mb-4">
            <div class="col-md-6 col-12">
                <label class="form-label fw-bold">Curso extracurricular</label>
                <select class="form-select form-select-lg" [(ngModel)]="idCursoSeleccionado" (change)="onCursoChange()">
                    <option [ngValue]="null">-- Seleccione un curso --</option>
                    <option *ngFor="let c of cursosExtra" [ngValue]="c.id">{{c.nombre}} ({{c.anio}})</option>
                </select>
            </div>
            <div class="col-md-6 col-12 d-flex align-items-end" *ngIf="cursoSeleccionado">
                <div class="curso-info">
                    <span class="info-item"><i class="fas fa-calendar me-1"></i> {{cursoSeleccionado.fecha_inicio}} al {{cursoSeleccionado.fecha_fin}}</span>
                    <span class="info-item" *ngIf="cursoSeleccionado.cupo_maximo"><i class="fas fa-users me-1"></i> Cupo: {{datos.length}} / {{cursoSeleccionado.cupo_maximo}}</span>
                </div>
            </div>
        </div>
    </div>

    <app-tablas *ngIf="idCursoSeleccionado"
        [titulos]="titulos"
        [datos]="datos"
        [raiz]="'/reportes/cursos-extra'"
        [columnasFiltro]="columnasFiltro"
        [mostrarBuscar]="true">
    </app-tablas>

    <div class="export-container" *ngIf="datos.length > 0">
        <button class="btn btn-success" (click)="exportarExcel()" [disabled]="exportando || cargando">
            <i class="fas fa-file-excel"></i>
            {{ exportando ? 'Exportando...' : 'Exportar a Excel' }}
        </button>
    </div>

    <div class="text-center text-muted py-5" *ngIf="!idCursoSeleccionado">
        <i class="fas fa-chart-bar fa-3x mb-3"></i>
        <p class="fs-5">Seleccione un curso para ver los estudiantes inscritos</p>
    </div>

    <div class="text-center text-muted py-4" *ngIf="idCursoSeleccionado && datos.length === 0 && !cargando">
        <i class="fas fa-user-graduate fa-2x mb-2"></i>
        <p>No hay estudiantes inscritos en este curso</p>
    </div>
</div>
