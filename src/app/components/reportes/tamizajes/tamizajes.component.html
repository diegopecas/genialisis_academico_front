<div class="modulo">
  <app-header
    [tituloModulo]="titulo"
    [mostrarCrear]="false"
    [raiz]="'/reportes'"
    [regresar]="'/reportes'"
  ></app-header>

  <div class="container-fluid mt-4">
    <!-- Selector de tipo de reporte -->
    <div class="selector-container">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="selector-card">
            <h4 class="selector-title">
              <i class="fas fa-filter"></i> Selecciona el tipo de análisis
            </h4>
            <div class="selector-buttons">
              <button 
                class="btn-selector" 
                [class.active]="tipoSeleccionado === 'psicologia'"
                (click)="seleccionarTipo('psicologia')">
                <i class="fas fa-brain"></i>
                <span>Psicología</span>
              </button>
              <button 
                class="btn-selector" 
                [class.active]="tipoSeleccionado === 'fonoaudiologia'"
                (click)="seleccionarTipo('fonoaudiologia')">
                <i class="fas fa-comment-medical"></i>
                <span>Fonoaudiología</span>
              </button>
              <button 
                class="btn-selector" 
                [class.active]="tipoSeleccionado === 'consolidado'"
                (click)="seleccionarTipo('consolidado')">
                <i class="fas fa-chart-bar"></i>
                <span>Consolidado</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Contenido según selección -->
    <div class="contenido-tamizaje" *ngIf="tipoSeleccionado">
      
      <!-- Vista de Psicología -->
      <div *ngIf="tipoSeleccionado === 'psicologia'" class="vista-psicologia">
        <app-tamizaje-psicologia></app-tamizaje-psicologia>
      </div>

      <!-- Vista de Fonoaudiología -->
      <div *ngIf="tipoSeleccionado === 'fonoaudiologia'" class="vista-fonoaudiologia">
        <app-tamizaje-fonoaudiologia></app-tamizaje-fonoaudiologia>
      </div>

      <!-- Vista Consolidada -->
      <div *ngIf="tipoSeleccionado === 'consolidado'" class="vista-consolidado">
        <app-tamizaje-consolidado></app-tamizaje-consolidado>
      </div>

    </div>

    <!-- Mensaje inicial -->
    <div *ngIf="!tipoSeleccionado" class="mensaje-inicial">
      <i class="fas fa-hand-pointer"></i>
      <p>Selecciona un tipo de análisis para comenzar</p>
    </div>
  </div>
</div>
